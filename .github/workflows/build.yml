name: 自动打包发布 (macOS)

on:
  push:
    tags:
      - 'v*' # 当你推送 v1.0.0 这种格式的标签时触发

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装核心依赖
        run: |
          pip install --upgrade pip
          # 只安装运行必备库，杜绝 2GB 垃圾文件
          pip install fastapi uvicorn sqlalchemy langchain-community langchain-text-splitters \
                      langchain-openai chromadb PySide6 PyInstaller pydantic-settings pymupdf

      - name: 执行 PyInstaller 打包
        run: |
            pyinstaller --windowed --name="LightingSystem" \
            --add-data=".env:." \
            --add-data="resources:resources" \
            --add-data="static:static" \
            --hidden-import="uvicorn.loops" \
            --hidden-import="uvicorn.loops.auto" \
            --hidden-import="uvicorn.protocols" \
            --hidden-import="uvicorn.protocols.http" \
            --hidden-import="uvicorn.protocols.http.auto" \
            --hidden-import="uvicorn.protocols.websockets" \
            --hidden-import="uvicorn.protocols.websockets.auto" \
            --hidden-import="uvicorn.lifespan" \
            --hidden-import="uvicorn.lifespan.on" \
            --hidden-import="uvicorn.lifespan.off" \
            --hidden-import="chromadb.telemetry.product.posthog" \
            --hidden-import="tiktoken_ext.openai_public" \
            --hidden-import="tiktoken_ext" \
            --copy-metadata tiktoken \
            --collect-all="chromadb" \
            --exclude-module="torch" \
            --exclude-module="torchvision" \
            --exclude-module="torchaudio" \
            --exclude-module="transformers" \
            --exclude-module="huggingface_hub" \
            --exclude-module="scipy" \
            --exclude-module="pandas" \
            --exclude-module="matplotlib" \
            desktop_app.py

      - name: 压缩产物 (保留快捷方式)
        run: |
          cd dist
          zip -y -r ../LightingSystem-macOS.zip LightingSystem.app

      - name: 创建 GitHub Release 并上传
        uses: softprops/action-gh-release@v2
        with:
          files: LightingSystem-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}